<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0;url=%VITE_SSB_URL%" />
    <title>Loading</title>
    <style>
      :root {
        --bg: #161616;
        --spinner: rgba(255, 255, 255, 0.25);
        --spinner-active: rgba(255, 255, 255, 0.8);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #ffffff;
          --spinner: rgba(0, 0, 0, 0.12);
          --spinner-active: rgba(0, 0, 0, 0.5);
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        -webkit-user-select: none;
        user-select: none;
      }

      .spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid var(--spinner);
        border-top-color: var(--spinner-active);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
